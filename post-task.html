<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>發布任務</title>

<style>
:root{
--bg:#102f28;
--card:#173b32;
--text:#f5f5f0;
--muted:#93aaa1;
--accent:#ff6b55;
--line:rgba(255,255,255,.12);
}

body{
margin:0;
background:var(--bg);
color:white;
font-family:Arial;
}

.wrap{
max-width:700px;
margin:50px auto;
padding:30px;
background:var(--card);
border:1px solid var(--line);
}

input,textarea,select{
width:100%;
padding:14px;
margin-top:8px;
margin-bottom:20px;
background:#0c241f;
color:white;
border:1px solid var(--line);
}

button{
width:100%;
padding:18px;
background:var(--accent);
border:none;
color:white;
font-weight:800;
cursor:pointer;
}
</style>
</head>

<body>

<div class="wrap">

<h1>發布任務</h1>

<input id="brand" placeholder="品牌">

<input id="product" placeholder="商品">

<input id="title" placeholder="任務標題">

<textarea id="description"
placeholder="任務說明"></textarea>

<select id="platform">
<option>Threads</option>
<option>Instagram</option>
<option>TikTok</option>
<option>Dcard</option>
</select>

<input id="category" placeholder="品類">

<input id="budget" placeholder="預算">

<input id="quota" placeholder="名額">

<button onclick="createTask()">
發布任務
</button>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxna_AGF5BSmpJ2y8Z5ayp9_9HKHX1S5th9ilZEF5fj8aF3g2u-F44klv_A5M1aVHPkCQ/exec";

const user =
JSON.parse(localStorage.getItem("user"));

async function createTask(){

const payload = {
action:"createTask",
brandUserId:user.userId,
brand:brand.value,
product:product.value,
title:title.value,
description:description.value,
platform:platform.value,
category:category.value,
budget:budget.value,
quota:quota.value
};

const res = await fetch(API_URL,{
method:"POST",
body:JSON.stringify(payload)
});

const data = await res.json();

if(data.success){
alert("建立成功");
location.href="tasks.html";
}
}
</script>

</body>
</html>
