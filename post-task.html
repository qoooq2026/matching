<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QOOOQ 發布任務</title>
<link rel="stylesheet" href="css/style.css">
<style>
.wrap { max-width: 620px; }
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">QOOOQ<span class="dot">•</span></a>
  <nav>
    <a href="tasks.html">TASKS</a>
    <div id="header-user"></div>
  </nav>
</header>

<div class="wrap">
  <div class="tag" style="margin-bottom:12px">POST A TASK</div>
  <h1 style="font-size:36px;margin:0 0 28px">發布任務</h1>

  <label>品牌名稱</label>
  <input id="brand" placeholder="例：OOO 品牌">

  <label>商品 / 服務</label>
  <input id="product" placeholder="例：OOO 保健品">

  <label>任務標題</label>
  <input id="title" placeholder="例：Threads 開箱文 × 保健品體驗">

  <label>任務說明</label>
  <textarea id="description" rows="5" placeholder="說明任務內容、需求、注意事項..."></textarea>

  <label>平台</label>
  <select id="platform">
    <option>Threads</option>
    <option>Instagram</option>
    <option>TikTok</option>
    <option>Dcard</option>
    <option>痞客邦</option>
    <option>方格子</option>
  </select>

  <label>品類</label>
  <input id="category" placeholder="例：保健、美妝、食品">

  <label>預算（每篇，NT$）</label>
  <input id="budget" type="number" placeholder="例：1000">

  <label>招募名額</label>
  <input id="quota" type="number" placeholder="例：5">

  <button class="btn" style="width:100%;margin-top:28px" onclick="createTask()">發布任務</button>
</div>

<script src="js/app.js"></script>
<script>
const user = requireLogin();

// 只有品牌方可以發任務
if (user && user.role !== "brand") {
  alert("發任務功能僅開放給品牌方。\n寫手請在任務牆瀏覽並報名任務！");
  location.href = "tasks.html";
}
renderHeaderUser();

async function createTask() {
  const title = document.getElementById("title").value.trim();
  if (!title) { alert("請填寫任務標題"); return; }

  const payload = {
    action:      "createTask",
    brandUserId: user.userId,
    brand:       document.getElementById("brand").value,
    product:     document.getElementById("product").value,
    title,
    description: document.getElementById("description").value,
    platform:    document.getElementById("platform").value,
    category:    document.getElementById("category").value,
    budget:      document.getElementById("budget").value,
    quota:       document.getElementById("quota").value
  };

  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  });
  const data = await res.json();

  if (data.success) {
    alert("任務發布成功！");
    location.href = "tasks.html";
  } else {
    alert(data.message || "發布失敗");
  }
}
</script>
</body>
</html>
