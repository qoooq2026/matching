<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QOOOQ Register</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <a class="logo" href="index.html">QOOOQ<span class="dot">•</span></a>
  <nav><a href="login.html">LOGIN</a></nav>
</header>

<div class="wrap">
  <h1 style="font-size:42px;line-height:1.05;margin:0 0 28px">建立帳號</h1>

  <label>名稱</label>
  <input id="name" placeholder="你的名字或品牌名稱">

  <label>EMAIL</label>
  <input id="email" type="email" placeholder="your@email.com">

  <label>密碼</label>
  <input id="password" type="password" placeholder="至少 6 碼">

  <label>身份</label>
  <select id="role">
    <option value="writer">寫手（接案方）</option>
    <option value="brand">品牌方（發案方）</option>
  </select>
  <p style="color:var(--muted);font-size:12px;margin:8px 0 0">
    寫手：建立個人資料、瀏覽並報名任務<br>
    品牌方：發布任務、查看寫手報名
  </p>

  <button class="btn" style="width:100%;margin-top:28px" onclick="register()">立即註冊</button>
  <p style="margin-top:18px;color:var(--muted);font-size:13px">
    已有帳號？<a href="login.html" style="color:var(--accent)">登入</a>
  </p>
</div>

<script src="js/app.js"></script>
<script>
if (getUser()) location.href = "tasks.html";

async function register() {
  const name     = document.getElementById("name").value.trim();
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const role     = document.getElementById("role").value;

  if (!name || !email || !password) { alert("請填寫所有欄位"); return; }
  if (password.length < 6) { alert("密碼至少 6 碼"); return; }

  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ action: "register", name, email, password, role })
  });
  const data = await res.json();

  if (data.success) {
    localStorage.setItem("user", JSON.stringify(data));
    // 寫手先去完善資料，品牌方直接去任務牆
    if (role === "writer") {
      location.href = "writer-profile.html";
    } else {
      location.href = "tasks.html";
    }
  } else {
    alert(data.message || "註冊失敗");
  }
}
</script>
</body>
</html>
