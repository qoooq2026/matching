<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>寫手資料</title>

<style>
:root{
--bg:#102f28;
--card:#173b32;
--text:#f5f5f0;
--muted:#93aaa1;
--accent:#ff6b55;
--line:rgba(255,255,255,.12);
}

body{
margin:0;
background:var(--bg);
color:white;
font-family:Arial;
}

.wrap{
max-width:700px;
margin:50px auto;
padding:30px;
background:var(--card);
border:1px solid var(--line);
}

input,textarea{
width:100%;
padding:14px;
margin-top:8px;
margin-bottom:20px;
background:#0c241f;
color:white;
border:1px solid var(--line);
}

button{
width:100%;
padding:18px;
background:var(--accent);
border:none;
color:white;
font-weight:800;
cursor:pointer;
}
</style>
</head>

<body>

<div class="wrap">

<h1>建立寫手資料</h1>

<input id="nickname" placeholder="暱稱">

<input id="platform" placeholder="Threads,IG,Dcard">

<input id="category" placeholder="保健、美妝、食品">

<input id="workType" placeholder="開文、回文">

<input id="price" placeholder="單篇價格">

<input id="portfolio" placeholder="作品連結">

<button onclick="saveProfile()">
儲存資料
</button>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxna_AGF5BSmpJ2y8Z5ayp9_9HKHX1S5th9ilZEF5fj8aF3g2u-F44klv_A5M1aVHPkCQ/exec";

const user =
JSON.parse(localStorage.getItem("user"));

async function saveProfile(){

const payload = {
action:"createWriterProfile",
userId:user.userId,
nickname:nickname.value,
platform:platform.value,
category:category.value,
workType:workType.value,
price:price.value,
portfolio:portfolio.value
};

const res = await fetch(API_URL,{
method:"POST",
body:JSON.stringify(payload)
});

const data = await res.json();

if(data.success){
alert("儲存成功");
location.href="tasks.html";
}
}
</script>

</body>
</html>
