<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QOOOQ 寫手資料</title>
<link rel="stylesheet" href="css/style.css">
<style>
.wrap { max-width: 600px; }
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">QOOOQ<span class="dot">•</span></a>
  <nav>
    <a href="tasks.html">TASKS</a>
    <div id="header-user"></div>
  </nav>
</header>

<div class="wrap">
  <div class="tag" style="margin-bottom:12px">WRITER PROFILE</div>
  <h1 style="font-size:36px;margin:0 0 28px">建立寫手資料</h1>

  <label>暱稱 / 筆名</label>
  <input id="nickname" placeholder="讀者認識你的名字">

  <label>平台（可複選）</label>
  <div class="tags-grid" id="platform-tags">
    <span class="tag-chip" data-val="Threads">Threads</span>
    <span class="tag-chip" data-val="Instagram">Instagram</span>
    <span class="tag-chip" data-val="TikTok">TikTok</span>
    <span class="tag-chip" data-val="Dcard">Dcard</span>
    <span class="tag-chip" data-val="痞客邦">痞客邦</span>
    <span class="tag-chip" data-val="方格子">方格子</span>
  </div>

  <label>擅長品類（可複選）</label>
  <div class="tags-grid" id="category-tags">
    <span class="tag-chip" data-val="保健">保健</span>
    <span class="tag-chip" data-val="美妝">美妝</span>
    <span class="tag-chip" data-val="食品">食品</span>
    <span class="tag-chip" data-val="旅遊">旅遊</span>
    <span class="tag-chip" data-val="3C">3C</span>
    <span class="tag-chip" data-val="親子">親子</span>
    <span class="tag-chip" data-val="寵物">寵物</span>
    <span class="tag-chip" data-val="生活風格">生活風格</span>
  </div>

  <label>文章類型（可複選）</label>
  <div class="tags-grid" id="worktype-tags">
    <span class="tag-chip" data-val="開文">開文</span>
    <span class="tag-chip" data-val="回文">回文</span>
    <span class="tag-chip" data-val="開箱">開箱</span>
    <span class="tag-chip" data-val="評測">評測</span>
    <span class="tag-chip" data-val="故事型">故事型</span>
    <span class="tag-chip" data-val="知識型">知識型</span>
  </div>

  <label>單篇收費（NT$）</label>
  <input id="price" type="number" placeholder="例：500">

  <label>作品連結（可填多個，換行分隔）</label>
  <textarea id="portfolio" rows="4" placeholder="https://example.com/post1&#10;https://example.com/post2"></textarea>

  <label>自我介紹</label>
  <textarea id="bio" rows="4" placeholder="簡單說說你的寫作風格、經歷或特色..."></textarea>

  <button class="btn" style="width:100%;margin-top:28px" onclick="saveProfile()">儲存資料</button>
</div>

<script src="js/app.js"></script>
<script>
const user = requireLogin();
if (user && user.role !== "writer") {
  alert("此頁面僅供寫手使用");
  location.href = "tasks.html";
}
renderHeaderUser();

// tag chip 多選
document.querySelectorAll(".tag-chip").forEach(chip => {
  chip.addEventListener("click", () => chip.classList.toggle("selected"));
});

function getSelected(containerId) {
  return [...document.querySelectorAll(`#${containerId} .tag-chip.selected`)]
    .map(c => c.dataset.val).join(",");
}

async function saveProfile() {
  const nickname = document.getElementById("nickname").value.trim();
  if (!nickname) { alert("請填寫暱稱"); return; }

  const payload = {
    action: "createWriterProfile",
    userId:   user.userId,
    nickname,
    platform: getSelected("platform-tags"),
    category: getSelected("category-tags"),
    workType: getSelected("worktype-tags"),
    price:    document.getElementById("price").value,
    portfolio:document.getElementById("portfolio").value,
    bio:      document.getElementById("bio").value
  };

  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  });
  const data = await res.json();

  if (data.success) {
    alert("資料已儲存！");
    location.href = "tasks.html";
  } else {
    alert(data.message || "儲存失敗");
  }
}
</script>
</body>
</html>
