<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QOOOQ Tasks</title>
<link rel="stylesheet" href="css/style.css">
<style>
.hero {
  text-align: center;
  padding: 60px 20px 30px;
}
.hero small { color: var(--accent); letter-spacing: 8px; font-size: 12px; }
.hero h1 { font-size: 60px; line-height: .93; margin: 18px 0; }
.hero p { color: var(--muted); font-size: 17px; }

.container { max-width: 1080px; margin: 0 auto 80px; padding: 0 24px; }
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin: 30px 0 20px;
}

.task-card { position: relative; }
.task-card .tag { margin-bottom: 10px; }
.task-card h3 { font-size: 22px; margin: 10px 0; }
.task-card .meta { color: var(--muted); line-height: 1.8; font-size: 14px; }
.task-card .price { font-size: 28px; font-weight: 900; margin: 16px 0 4px; }
.task-card .status { color: var(--green); font-size: 12px; letter-spacing: 2px; margin: 0 0 14px; }
.task-card .btn { width: 100%; }

/* 空狀態 */
.empty {
  text-align: center;
  color: var(--muted);
  padding: 60px 20px;
  grid-column: 1/-1;
}
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">QOOOQ<span class="dot">•</span></a>
  <nav>
    <a href="tasks.html">TASKS</a>
    <div id="header-user"></div>
  </nav>
</header>

<section class="hero">
  <small>QOOOQ WRITER MATCHING</small>
  <h1>任務媒合牆</h1>
  <p>品牌發案，寫手接案，用真實內容創造曝光。</p>
</section>

<div class="container">
  <div class="topbar">
    <div>
      <div class="tag">LIVE TASK WALL</div>
      <h2 style="margin:6px 0 0">目前開放任務</h2>
    </div>
    <!-- 按鈕依身份動態顯示 -->
    <div id="action-btn"></div>
  </div>

  <div id="tasks" class="grid">
    <p style="color:var(--muted)">載入中…</p>
  </div>
</div>

<script src="js/app.js"></script>
<script>
const user = requireLogin();
renderHeaderUser();

// 依身份顯示不同按鈕
const actionBtn = document.getElementById("action-btn");
if (user) {
  if (user.role === "brand") {
    actionBtn.innerHTML = `<button class="btn" onclick="location.href='post-task.html'">＋ 發布任務</button>`;
  } else {
    actionBtn.innerHTML = `<button class="btn-outline" onclick="location.href='writer-profile.html'">編輯我的資料</button>`;
  }
}

async function loadTasks() {
  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ action: "getOpenTasks" })
  });
  const data = await res.json();
  const box = document.getElementById("tasks");

  if (!data.success || !data.tasks || data.tasks.length === 0) {
    box.innerHTML = `<div class="empty"><p>目前沒有開放任務</p></div>`;
    return;
  }

  // 寫手看到「報名」按鈕，品牌方看到「我發的任務」提示
  const isWriter = user && user.role === "writer";

  box.innerHTML = data.tasks.map(t => {
    const taskId = t["taskId"] || t["任務ID"] || "";
    const applyBtn = isWriter
      ? `<button class="btn" onclick="applyTask('${taskId}')">我要報名</button>`
      : `<span style="color:var(--muted);font-size:12px">品牌方模式</span>`;

    return `
      <div class="card task-card">
        <div class="tag">${t["平台"] || ""}・${t["品類"] || ""}</div>
        <h3>${t["任務標題"] || ""}</h3>
        <div class="meta">
          品牌：${t["品牌"] || "—"}<br>
          商品：${t["商品"] || "—"}<br>
          名額：${t["名額"] || "—"} 人
        </div>
        <p class="meta" style="margin-top:10px">${t["任務說明"] || ""}</p>
        <div class="price">NT$ ${t["預算"] || "—"}</div>
        <p class="status">● OPEN</p>
        ${applyBtn}
      </div>
    `;
  }).join("");
}

async function applyTask(taskId) {
  if (!taskId) { alert("任務 ID 有誤"); return; }
  if (!user || user.role !== "writer") {
    alert("只有寫手可以報名任務");
    return;
  }

  const note = prompt("可附上報名備註（選填，直接按確定也可）") || "";

  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "applyTask",
      taskId,
      writerUserId: user.userId,
      note
    })
  });
  const data = await res.json();

  if (data.success) {
    alert("報名成功 🎉");
  } else {
    alert(data.message || "報名失敗");
  }
}

loadTasks();
</script>
</body>
</html>
