<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>QOOOQ Tasks</title>
<style>
:root{--bg:#102f28;--bg2:#173b32;--card:rgba(18,54,45,.85);--text:#f5f5f0;--muted:#93aaa1;--accent:#ff6b55;--line:rgba(255,255,255,.12);--green:#5ee18a}
body{margin:0;background:linear-gradient(135deg,var(--bg),#0b211d);color:var(--text);font-family:Arial,"Noto Sans TC",sans-serif}
header{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;border-bottom:1px solid var(--line)}
.logo{font-size:32px;font-weight:900;letter-spacing:-3px}.dot{color:var(--accent)}
nav a{color:white;text-decoration:none;margin-left:24px;font-size:11px;letter-spacing:4px}
.hero{text-align:center;padding:80px 20px 40px}
.hero small{color:var(--accent);letter-spacing:8px}
.hero h1{font-size:68px;line-height:.95;margin:25px 0}
.hero p{color:var(--muted);font-size:18px}
.container{max-width:1080px;margin:0 auto 80px;padding:0 20px}
.topbar{display:flex;justify-content:space-between;align-items:center;margin:30px 0}
.btn{background:var(--accent);color:white;border:0;padding:14px 22px;font-weight:800;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
.card{background:var(--card);border:1px solid var(--line);padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.22)}
.tag{color:var(--accent);font-size:11px;letter-spacing:4px}
.card h3{font-size:24px;margin:14px 0}
.meta{color:var(--muted);line-height:1.8}
.price{font-size:30px;font-weight:900;margin-top:18px}
.status{color:var(--green);font-size:12px}
</style>
</head>
<body>

<header>
  <div class="logo">QOOOQ<span class="dot">•</span></div>
  <nav>
    <a href="tasks.html">TASK</a>
    <a href="register.html">JOIN</a>
    <a href="#" onclick="logout()">LOGOUT</a>
  </nav>
</header>

<section class="hero">
  <small>QOOOQ WRITER MATCHING</small>
  <h1>素人寫手<br>任務媒合牆</h1>
  <p>品牌發案，寫手接案，用真實內容創造曝光。</p>
</section>

<div class="container">
  <div class="topbar">
    <div>
      <div class="tag">LIVE TASK WALL</div>
      <h2>目前開放任務</h2>
    </div>
    <button class="btn" onclick="location.href='post-task.html'">發布任務</button>
  </div>

  <div id="tasks" class="grid"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxna_AGF5BSmpJ2y8Z5ayp9_9HKHX1S5th9ilZEF5fj8aF3g2u-F44klv_A5M1aVHPkCQ/exec";

const user = JSON.parse(localStorage.getItem("user") || "null");
if(!user){
  location.href = "login.html";
}

async function loadTasks(){
  const res = await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({action:"getOpenTasks"})
  });

  const data = await res.json();
  const box = document.getElementById("tasks");

  if(!data.tasks || data.tasks.length === 0){
    box.innerHTML = "<p>目前沒有開放任務</p>";
    return;
  }

  box.innerHTML = data.tasks.map(t => `
    <div class="card">
      <div class="tag">${t["平台"] || ""}・${t["品類"] || ""}</div>
      <h3>${t["任務標題"] || ""}</h3>
      <div class="meta">
        品牌：${t["品牌"] || ""}<br>
        商品：${t["商品"] || ""}<br>
        名額：${t["名額"] || ""} 人
      </div>
      <p class="meta">${t["任務說明"] || ""}</p>
      <div class="price">NT$ ${t["預算"] || "-"}</div>
      <p class="status">● OPEN</p>
      <button class="btn" onclick="applyTask('${t["taskId"]}')">我要報名</button>
    </div>
  `).join("");
}

async function applyTask(taskId){
  if(user.role !== "writer"){
    alert("只有寫手可以報名任務");
    return;
  }

  const note = prompt("請輸入報名備註，可留空");

  const res = await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      action:"applyTask",
      taskId,
      writerUserId:user.userId,
      note:note || ""
    })
  });

  const data = await res.json();

  if(data.success){
    alert("報名成功");
  }else{
    alert(data.message);
  }
}

function logout(){
  localStorage.removeItem("user");
  location.href = "login.html";
}

loadTasks();
</script>

</body>
</html>
