<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QOOOQ Matching</title>
<link rel="stylesheet" href="css/style.css">
<style>
.hero {
  padding: 110px 20px 60px;
  text-align: center;
}
.hero small {
  color: var(--accent);
  letter-spacing: 8px;
  font-size: 12px;
}
.hero h1 {
  font-size: 76px;
  line-height: .93;
  margin: 22px 0;
}
.hero p {
  color: var(--muted);
  font-size: 18px;
}
.cta {
  margin-top: 40px;
  display: flex;
  justify-content: center;
  gap: 16px;
}
.stats-box {
  max-width: 400px;
  margin: 60px auto 0;
  padding: 28px;
  border: 1px solid var(--line);
  background: rgba(0,0,0,.15);
  text-align: center;
}
.stats-box h2 {
  font-size: 60px;
  margin: 0;
}
.stats-box p { color: var(--muted); margin: 6px 0 0; }
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">QOOOQ<span class="dot">•</span></a>
  <nav>
    <a href="tasks.html">TASKS</a>
    <div id="header-user"></div>
  </nav>
</header>

<section class="hero">
  <small>QOOOQ MATCHING PLATFORM</small>
  <h1>找到對的人<br>比找到流量重要</h1>
  <p>品牌發案、寫手接案、真實內容媒合</p>
  <div class="cta">
    <button class="btn" onclick="location.href='register.html'">立即加入</button>
    <button class="btn-outline" onclick="location.href='tasks.html'">查看任務</button>
  </div>
  <div class="stats-box">
    <p>LIVE TASK WALL</p>
    <h2 id="task-count">—</h2>
    <p>目前開放任務</p>
  </div>
</section>

<script src="js/app.js"></script>
<script>
renderHeaderUser();

// 動態抓任務數量
async function loadCount() {
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({ action: "getOpenTasks" })
    });
    const data = await res.json();
    if (data.success) {
      document.getElementById("task-count").textContent = data.tasks.length;
    }
  } catch(e) {}
}
loadCount();
</script>
</body>
</html>
