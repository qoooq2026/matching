<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QOOOQ Login</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <a class="logo" href="index.html">QOOOQ<span class="dot">•</span></a>
  <nav><a href="register.html">REGISTER</a></nav>
</header>

<div class="wrap">
  <h1 style="font-size:42px;line-height:1.05;margin:0 0 28px">登入平台</h1>

  <label>EMAIL</label>
  <input id="email" type="email" placeholder="your@email.com">

  <label>密碼</label>
  <input id="password" type="password" placeholder="••••••••">

  <button class="btn" style="width:100%;margin-top:28px" onclick="login()">登入</button>
  <p style="margin-top:18px;color:var(--muted);font-size:13px">
    還沒有帳號？<a href="register.html" style="color:var(--accent)">立即註冊</a>
  </p>
</div>

<script src="js/app.js"></script>
<script>
// 已登入直接跳轉
if (getUser()) location.href = "tasks.html";

async function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (!email || !password) { alert("請填寫 Email 與密碼"); return; }

  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ action: "login", email, password })
  });
  const data = await res.json();

  if (data.success) {
    localStorage.setItem("user", JSON.stringify(data));
    // 寫手第一次登入導去完善資料（可依需求調整）
    location.href = "tasks.html";
  } else {
    alert(data.message || "帳號或密碼錯誤");
  }
}
</script>
</body>
</html>
