
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>QOOOQ Login</title>
<style>
:root{--bg:#102f28;--card:#173b32;--text:#f5f5f0;--muted:#93aaa1;--accent:#ff6b55;--line:rgba(255,255,255,.12)}
body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,"Noto Sans TC",sans-serif}
.wrap{max-width:460px;margin:80px auto;padding:36px;background:var(--card);border:1px solid var(--line)}
.logo{font-size:34px;font-weight:900;letter-spacing:-3px}.dot{color:var(--accent)}
h1{font-size:42px;line-height:1.05}
label{display:block;margin-top:18px;color:var(--muted)}
input{width:100%;padding:14px;margin-top:8px;background:#0c241f;color:white;border:1px solid var(--line)}
button{margin-top:28px;width:100%;padding:16px;background:var(--accent);color:white;border:0;font-weight:800;cursor:pointer}
a{color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">QOOOQ<span class="dot">•</span></div>
  <h1>登入平台</h1>

  <label>Email</label>
  <input id="email">

  <label>密碼</label>
  <input id="password" type="password">

  <button onclick="login()">登入</button>
  <p>還沒有帳號？<a href="register.html">註冊</a></p>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxna_AGF5BSmpJ2y8Z5ayp9_9HKHX1S5th9ilZEF5fj8aF3g2u-F44klv_A5M1aVHPkCQ/exec";

async function login(){
  const payload = {
    action:"login",
    email:document.getElementById("email").value,
    password:document.getElementById("password").value
  };

  const res = await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify(payload)
  });

  const data = await res.json();

  if(data.success){
    localStorage.setItem("user", JSON.stringify(data));
    location.href = "tasks.html";
  }else{
    alert(data.message);
  }
}
</script>
</body>
</html>
